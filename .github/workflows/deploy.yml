name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Copy docs to root for GitHub Pages
        run: |
          cp docs/index.html .
          cp -r docs/assets .
          cp docs/*.css . 2>/dev/null || true
          cp docs/*.js . 2>/dev/null || true
          cp docs/favicon.svg .
          cp docs/friends.json .
          cp docs/icons.svg .
          cp docs/404.html .
          cp docs/.nojekyll .
      
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html assets favicon.svg friends.json icons.svg 404.html .nojekyll
          git diff --cached --quiet || git commit -m "Deploy: Update built app files"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
